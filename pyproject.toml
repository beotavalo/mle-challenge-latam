# Tooling configuration only.
#
# Dependency management intentionally stays in the requirements*.txt files shipped
# with the challenge, so `make install` keeps working exactly as provided. This file
# holds the quality-gate configuration (ruff, mypy, coverage entry points) shared by
# local development and CI.

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".venv", "challenge/exploration.ipynb", "mlruns"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "PTH",  # flake8-use-pathlib
    "S",    # flake8-bandit (security)
    "RUF",  # ruff-specific rules
]

[tool.ruff.lint.per-file-ignores]
# The DelayModel signatures are provided by the challenge and must not change;
# keep the original `typing.Union`/`Tuple` style instead of PEP 604 unions.
"challenge/model.py" = ["UP006", "UP007", "UP035"]
# Tests legitimately use bare asserts and hardcoded sample values.
"tests/**" = ["S101"]

[tool.ruff.lint.isort]
known-first-party = ["challenge"]

[tool.mypy]
python_version = "3.10"
files = ["challenge"]
strict = true
# pandas 1.3.5 / scikit-learn 1.3 ship no type information for this version range.
ignore_missing_imports = true
warn_unused_ignores = false
disallow_untyped_calls = false
